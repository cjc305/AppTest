name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'   # e.g. v1.0.0

jobs:
  release-bundle:
    name: Build & Upload Release AAB
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      # Inject production Supabase credentials from GitHub Actions secrets.
      # Secrets must be added in Settings → Secrets and variables → Actions:
      #   SUPABASE_URL         (e.g. https://jefgixmmlqtgbxobukkt.supabase.co)
      #   SUPABASE_ANON_KEY    (anon/public key from Supabase dashboard)
      - name: Create local.properties from secrets
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> local.properties
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> local.properties

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v3

      # Signing: wire keystore secrets when upload keystore is provisioned (APT-OPS-001 / §2.6).
      # Until then, bundleRelease produces an unsigned AAB — suitable for local testing.
      # When ready, add these GitHub secrets and uncomment the signing block in app/build.gradle.kts:
      #   KEYSTORE_BASE64      (base64 of upload.keystore)
      #   KEY_ALIAS            (alias set during keytool -genkey)
      #   KEY_PASSWORD         (key password)
      #   STORE_PASSWORD       (keystore password)
      - name: Decode keystore (when provisioned)
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/upload.keystore
          echo "storeFile=../upload.keystore"   >> local.properties
          echo "storePassword=${{ secrets.STORE_PASSWORD }}" >> local.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> local.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> local.properties

      - name: Run checks
        run: ./gradlew spotlessCheck detekt enforceFileLineLimit testDebugUnitTest

      - name: Build release AAB
        run: ./gradlew bundleRelease

      - name: Upload release AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-aab-${{ github.ref_name }}
          path: app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      # Play Store upload — requires google-play action + service-account JSON secret.
      # Uncomment when Play Console is set up (APT-OPS-001 §2.5).
      # - name: Upload to Play Store (internal track)
      #   uses: r0adkll/upload-google-play@v1
      #   with:
      #     serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
      #     packageName: com.apptest.app
      #     releaseFiles: app/build/outputs/bundle/release/app-release.aab
      #     track: internal
      #     status: completed
